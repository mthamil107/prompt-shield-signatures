name: publish

on:
  # Manual-only for v0.6.0-alpha. The auto-daily cron was disabled after we
  # discovered it created signature-lag loops: every CI rebuild bumps
  # generated_at (now sourced from git commit time, but bot-pushed commits
  # still produce a new commit time → new generated_at → maintainer's
  # signature stale until they re-sign). For an alpha with offline signing
  # and zero contributor PRs in flight, manual rebuild via workflow_dispatch
  # is the honest cadence. v0.7.0 (Sigstore Cosign keyless signing) re-enables
  # the cron because the key lives in OIDC, not the maintainer's laptop.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Rebuild and publish v1/signatures.json
    runs-on: ubuntu-latest
    # Skip the auto-rebuild commit itself to avoid loops.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Build v1/signatures.json
        run: python scripts/build.py build

      # NOTE: signing is deliberately NOT performed in CI. The minisign
      # secret key stays on the maintainer's local machine. After this
      # workflow publishes a new v1/signatures.json, the maintainer runs
      # `python scripts/build.py sign` locally and pushes the resulting
      # v1/signatures.json.minisig as a separate commit.

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain v1/signatures.json)" ]; then
            git add v1/signatures.json
            git commit -m "chore(auto): rebuild v1/signatures.json [skip ci]"
            git push
          else
            echo "No changes to v1/signatures.json — nothing to commit."
          fi
